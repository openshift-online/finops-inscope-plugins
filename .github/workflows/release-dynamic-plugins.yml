name: Release Dynamic Plugins

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build frontend dynamic plugin tgz
        run: |
          mkdir -p dist
          mkdir -p plugins/finops/dist-types/src
          printf 'export {}\n' > plugins/finops/dist-types/src/index.d.ts
          yarn workspace @internal/backstage-plugin-finops build
          cd plugins/finops
          npx @red-hat-developer-hub/cli@latest plugin export
          cd dist-dynamic
          npm pack
          mv *.tgz ../../../dist/backstage-finops-frontend.tgz

      - name: Build backend dynamic plugin tgz
        run: |
          mkdir -p plugins/finops-backend/dist-types/src
          printf 'export {}\n' > plugins/finops-backend/dist-types/src/index.d.ts
          yarn workspace @internal/backstage-plugin-finops-backend build
          cd plugins/finops-backend
          npx @red-hat-developer-hub/cli@latest plugin export
          cd dist-dynamic
          npm pack
          mv *.tgz ../../../dist/backstage-finops-backend.tgz

      - name: Write checksums and SRI integrity
        run: |
          sha256sum dist/backstage-finops-frontend.tgz > dist/backstage-finops-frontend.tgz.sha256
          sha256sum dist/backstage-finops-backend.tgz > dist/backstage-finops-backend.tgz.sha256
          echo -n "sha256-$(openssl dgst -sha256 -binary dist/backstage-finops-frontend.tgz | openssl base64 -A)" > dist/backstage-finops-frontend.tgz.integrity
          echo -n "sha256-$(openssl dgst -sha256 -binary dist/backstage-finops-backend.tgz | openssl base64 -A)" > dist/backstage-finops-backend.tgz.integrity

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: FinOps dynamic plugins ${{ github.ref_name }}
          artifacts: >-
            dist/backstage-finops-frontend.tgz,
            dist/backstage-finops-backend.tgz,
            dist/backstage-finops-frontend.tgz.sha256,
            dist/backstage-finops-backend.tgz.sha256,
            dist/backstage-finops-frontend.tgz.integrity,
            dist/backstage-finops-backend.tgz.integrity
          generateReleaseNotes: true
          allowUpdates: true
