---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: backstage-test-extras
labels:
  template: backstage-test-extras
parameters:
  - name: DATABASE_SECRET_NAME
    displayName: Name of the secret with DB configuration
    value: "backstage-db"

  - name: S3_SECRET_NAME
    displayName: Name of the secret with S3 configuration
    value: "inscope-s3-creds"

  - name: ELASTICACHE_SECRET_NAME
    displayName: Name of the secret with Elasticache configuration
    value: "backstage-elasticache-db"

  - name: KEYCLOAK_ADMIN_USER
    displayName: Name of the secret with Keycloak admin user
    value: "keycloak-admin"

  - name: KEYCLOAK_ADMIN_PASSWORD
    displayName: Name of the secret with Keycloak admin password
    value: "testtesttest"

  - name: KEYCLOAK_CLIENT_ID
    displayName: Name of the secret with Keycloak client ID
    value: "backstage"

  - name: KEYCLOAK_CLIENT_SECRET
    displayName: Name of the secret with Keycloak client secret
    value: "testtesttest"

objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${S3_SECRET_NAME}
    stringData:
      minio_root_user: testtesttest
      minio_root_password: testtesttest
      aws_access_key_id: testtesttest
      aws_region: none
      aws_secret_access_key: testtesttest
      bucket: backstage
      endpoint: backstage-minio:9000
      region: none

  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${DATABASE_SECRET_NAME}
    stringData:
      db.host: backstage-db
      db.port: "5432"
      db.name: backstage
      db.user: backstage
      db.password: testtesttest
      db.adminPassword: adminadminadmin
      db.ca_cert: ""
  # minio deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: backstage-minio
      name: backstage-minio
    spec:
      selector:
        matchLabels:
          app: backstage-minio
      template:
        metadata:
          labels:
            app: backstage-minio
        spec:
          containers:
            - args:
                - server
                - /storage
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      key: minio_root_user
                      name: ${S3_SECRET_NAME}
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: minio_root_password
                      name: ${S3_SECRET_NAME}
              image: quay.io/app-sre/minio:RELEASE.2025-01-20T14-49-07Z
              imagePullPolicy: IfNotPresent
              livenessProbe:
                failureThreshold: 3
                initialDelaySeconds: 10
                periodSeconds: 10
                successThreshold: 1
                tcpSocket:
                  port: 9000
                timeoutSeconds: 2
              name: backstage-minio
              ports:
                - containerPort: 9000
                  name: minio
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                initialDelaySeconds: 20
                periodSeconds: 10
                successThreshold: 1
                tcpSocket:
                  port: 9000
                timeoutSeconds: 2
              resources: {}
              volumeMounts:
                - mountPath: /storage
                  name: backstage-minio-storage
          volumes:
            - emptyDir: {}
              name: backstage-minio-storage

  - kind: Service
    apiVersion: v1
    metadata:
      name: backstage-minio
      labels:
        app: backstage-minio
    spec:
      selector:
        app: backstage-minio
      ports:
        - name: minio
          port: 9000
          targetPort: 9000
          protocol: TCP
  # backstage-db deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      app: backstage-db
      name: backstage-db
    spec:
      selector:
        matchLabels:
          app: backstage-db
      template:
        metadata:
          labels:
            app: backstage-db
        spec:
          containers:
            - env:
                - name: POSTGRESQL_USER
                  valueFrom:
                    secretKeyRef:
                      key: db.user
                      name: ${DATABASE_SECRET_NAME}
                - name: POSTGRESQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: db.password
                      name: ${DATABASE_SECRET_NAME}
                - name: POSTGRESQL_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: db.adminPassword
                      name: ${DATABASE_SECRET_NAME}
                - name: POSTGRESQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      key: db.name
                      name: ${DATABASE_SECRET_NAME}
              image: quay.io/cloudservices/postgresql-rds:16-288a035
              imagePullPolicy: IfNotPresent
              livenessProbe:
                exec:
                  command:
                    - psql
                    - -U
                    - $(POSTGRESQL_USER)
                    - -d
                    - $(POSTGRESQL_DATABASE)
                    - -c
                    - SELECT 1
                failureThreshold: 3
                initialDelaySeconds: 15
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 2
              name: backstage-no-op-db
              ports:
                - containerPort: 5432
                  name: database
                  protocol: TCP
              readinessProbe:
                exec:
                  command:
                    - psql
                    - -U
                    - $(POSTGRESQL_USER)
                    - -d
                    - $(POSTGRESQL_DATABASE)
                    - -c
                    - SELECT 1
                failureThreshold: 3
                initialDelaySeconds: 45
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 2
              resources:
                limits:
                  cpu: 600m
                  memory: 1Gi
                requests:
                  cpu: 300m
                  memory: 512Mi
              volumeMounts:
                - mountPath: /var/lib/pgsql/data
                  name: backstage-no-op-db
          volumes:
            - emptyDir: {}
              name: backstage-no-op-db

  - kind: Service
    apiVersion: v1
    metadata:
      name: backstage-db
      labels:
        app: backstage-db
    spec:
      selector:
        app: backstage-db
      ports:
        - name: database
          port: 5432
          protocol: TCP
          targetPort: 5432

  # valkey deployment
  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: valkey-deployment
      labels:
        app: valkey
    spec:
      replicas: 1 # Adjust replica count as needed
      selector:
        matchLabels:
          app: valkey
      template:
        metadata:
          labels:
            app: valkey
        spec:
          containers:
            - name: valkey
              image: registry.redhat.io/rhel10/valkey-8:10.0-1758500270 # Use the desired Valkey image tag
              ports:
                - containerPort: 6379
              volumeMounts:
                - name: valkey-data
                  mountPath: /data # Default data directory for Valkey
          volumes:
            - name: valkey-data
              persistentVolumeClaim:
                claimName: valkey-pvc

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: valkey-pvc
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi # Adjust storage size as needed

  - apiVersion: v1
    kind: Service
    metadata:
      name: valkey-service
    spec:
      selector:
        app: valkey
      ports:
        - protocol: TCP
          port: 6379
          targetPort: 6379
      type: ClusterIP # Or NodePort/LoadBalancer for external access

  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${ELASTICACHE_SECRET_NAME}
    stringData:
      db.auth_token: testtesttest
      db.endpoint: valkey-service
      db.port: "6379"

  # app-config deployment
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: backstage-app-config
    data:
      app-config.yaml: |
        dangerouslyAllowSignInWithoutUserInCatalog: true
        quay:
          uiUrl: 'https://quay.io'
        app:
          title: inScope
          baseUrl: http://localhost:7007
          firelink:
            firelinkUrl: ${FIRELINK_APP_URL}
            ephemeralUrl: ${FIRELINK_EPHEMERAL_CONSOLE_URL}
          support:
            url: https://redhat.enterprise.slack.com/archives/C05P11UAY3S
            items:
              - title: inScope Developer Portal
                links:
                - url: https://redhat.enterprise.slack.com/archives/C05P11UAY3S
                  title: inScope Developer Portal Slack
        acs:
          acsUrl: ${ACS_API_URL}

        grafana:
          dashboardUrl: "https://grafana.app-sre.devshift.net/d/feq1jm3omydq8c/hcm-cicd-test-logs"
        auth:
          providers:
            guest: {}
            github:
              development:
                $include: /app/github/github-app-backstage-showcase-credentials.yaml
          environment: development
          allowGuestAccess: true

        backend:
          reading:
            allow:
              - host: '*.redhat.com'
              - host: 'catalog-data:8080'
              - host: 'api.openshift.com'

          #TODO: we need to make this secret more secret
          auth:
            dangerouslyDisableDefaultAuthPolicy: true
            keys:
              - secret: RCBSU0EgUFJJVkFURSBLRVktLS0tLQo=
          listen: 0.0.0.0:7007
          baseUrl: http://localhost:7007
          csp:
            # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
            # Default Helmet Content-Security-Policy values can be removed by setting the key to false
            connect-src:
              - "'self'"
              - 'http:'
              - 'https:'
            # Plugin: Jira
            img-src:
              # "'self'" and 'data' are from the backstage default but must be set since img-src is overwritten
              - "'self'"
              - 'data:'
              # Allow your Jira instance for @roadiehq/backstage-plugin-jira
              # - ${JIRA_URL}
          cors:
            origin: '*'

          database:
            client: pg
            connection:
              host: ${POSTGRES_HOST}
              port: ${POSTGRES_PORT}
              user: ${POSTGRES_USER}
              password: ${POSTGRES_PASSWORD}
          cache:
            store: redis
            connection: redis://${CACHE_TOKEN}@${CACHE_HOST}:${CACHE_PORT}
            useRedisSets: true
        permission:
          enabled: false
        catalog:
          rules:
            - allow: [Component, API, Location, System, Group, User, Domain]
          locations:
            - type: file
              target: /opt/app-root/src/catalog-entities/all.yaml
              rules:
                - allow: [Component, API, Location, System, Group, User, Domain]
            - type: file
              target: /opt/app-root/src/inscope-catalog-entries/catalog-entities.yaml
              rules:
                - allow: [Component, API, Location, System, Group, User, Domain, Template]
            - type: file
              target: /opt/app-root/src/inscope-catalog-entries/catalog-templates.yaml
              rules:
                - allow: [Component, API, Location, System, Group, User, Domain, Template]
        organization:
          name: Red Hat

        integrations:
          # Plugin: GitHub
          github:
            - host: github.com
              # This is a GitHub App. You can find out how to generate this file, and more information
              # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/github-apps
              apps:
                - $include: /app/github/github-app-backstage-showcase-credentials.yaml
                # - appId: ${GITHUB_APP_APP_ID}
                #   webhookUrl: ${GITHUB_APP_WEBHOOK_URL}
                #   clientId: ${GITHUB_APP_CLIENT_ID}
                #   clientSecret: ${GITHUB_APP_CLIENT_SECRET}
                #   webhookSecret: ${GITHUB_APP_WEBHOOK_SECRET}
                #   privateKey: |
                #     ${GITHUB_APP_PRIVATE_KEY}

          # Plugin: GitLab
          gitlab:
            - host: ${GITLAB_HOST}
              token: ${GITLAB_TOKEN}
              apiBaseUrl: ${GITLAB_API_BASE_URL}
              baseUrl: ${GITLAB_BASE_URL}
        proxy:
          endpoints:
            '/ephemeral':
              target: "${FIRELINK_EPHEMERAL_API_URL}"
              headers:
                Authorization: "Bearer ${FIRELINK_EPHEMERAL_API_TOKEN}"
              changeOrigin: true
            '/developer-hub':
              target: 'http://inscope-resources'
              pathRewrite:
                '^/api/proxy/developer-hub': '/resources/json/homepage.json'
              changeOrigin: true
            '/inscope-resources':
              target: 'http://inscope-resources'
              changeOrigin: true
              # Inscope resources doesn't serve out over SSL
              secure: false
            '/inscope-resources/resources/images':
              target: "http://resources:8000/api/proxy/inscope-resources/resources/images"
              changeOrigin: true
              secure: false
              # This needs to unauthed because images are loaded via img tags
              # and thus don't include auth cookies
              # These are static content and represent no risk
              credentials: dangerously-allow-unauthenticated
            '/status':
              target: 'https://status.redhat.com/api/v2/summary.json'
              changeOrigin: true
            '/finops':
              target: 'http://localhost:7007/api/finops'
              credentials: dangerously-allow-unauthenticated
              changeOrigin: true
            '/snyk':
              target: 'https://api.snyk.io/'
              headers:
                User-Agent: 'tech-services/backstage-plugin/1.0'
                Authorization: 'token ${SNYK_AUTH_TOKEN}'
            '/web-rca':
              target: 'https://api.stage.openshift.com/api/web-rca/v1'
              allowedHeaders: ['Authorization']
              # This is ok to allow since this route isn't pre-authenticated
              # web rca backend plugin gets an oauth token from SSO before talking to this endpoint
              credentials: dangerously-allow-unauthenticated
            '/status-board':
              target: 'https://api.stage.openshift.com/api/status-board/v1'
              allowedHeaders: ['Authorization']
              # I am not sure what uses this so not changing it for now
              credentials: dangerously-allow-unauthenticated
            '/sso-redhat':
              target: 'https://sso.redhat.com'
              allowedHeaders: ['Content-Type']
              # This is ok because this is not a pre-authenticated route
              # It is called by web rca backend plugin, not the frontend
              credentials: dangerously-allow-unauthenticated
          #Plugin Proxy: Visual Qontract
            '/visual-qontract': 
              target: 'http://qontract-server:4000'
            '/prometheus':
              target: "https://prometheus.crcs02ue1.devshift.net/api/v1/"
              allowedMethods: ['POST', 'GET']
              headers:
                Authorization: "Bearer ${STAGE_PROMETHEUS_TOKEN}"
        #   #Plugin Proxy: Openshift Deployment Info
            '/openshift-deployments': 
              target: 'http://qontract-server:4000'
            '/stage':
              target: 'https://api.crcs02ue1.urby.p1.openshiftapps.com:6443'
              headers:
                Authorization: "Bearer ${STAGE_CLUSTER_API_TOKEN}"
            '/prod':
              target: 'https://api.crcp01ue1.o9m8.p1.openshiftapps.com:6443'
              headers:
                Authorization: "Bearer ${PROD_CLUSTER_API_TOKEN}"
        #   #AI Search Frontend
        #     # '/tangerine':
        #     #   target: ${TANGERINE_CLUSTER_URL}
        #     #   headers:
        #     #     Authorization: Bearer ${TANGERINE_SA}
        #     #   allowedMethods: ['POST', 'GET']
        #     #Plugin: Quay
            '/quay/api':
              target: https://quay.io/
              headers:
                X-Requested-With: 'XMLHttpRequest'
                # Uncomment the following line to access a private Quay Repository using a token
                Authorization: 'Bearer ${QUAY_API_TOKEN}'
              changeOrigin: true
              secure: true
        #     #Plugin: Ibutsu
        #     # '/ibutsu':
        #     #   target: https://ibutsu-api.insights.corp.redhat.com
        #     #   headers:
        #     #     Authorization: "Bearer ${IBUTSU_API_TOKEN}"

            #Plugin: Security (Grype)
            '/qontract': 
              target: 'qontract-server:4000'
              credentials: dangerously-allow-unauthenticated
            '/actions':
              target: "https://api.github.com"
              headers:
                Authorization: "Bearer ${GITHUB_ACTIONS_PAT}"
              credentials: dangerously-allow-unauthenticated
              allowedHeaders:
                - Location
                - Authorization
                - X-GitHub-Api-Version
                - Accept

        #     #Plugin: ACS
            '/acs':
              credentials: dangerously-allow-unauthenticated
              target: ${ACS_API_URL}
              headers:
                authorization: "Bearer ${ACS_API_KEY}"

        #     #Plugin merge queue
        #     '/mergeq':
        #         target: 'https://gitlab.cee.redhat.com/service/app-interface-output/-/raw/master/'
        #         changeOrigin: true

        #     #Plugin: Kafka-Info
            '/kafka-lag':
              target: 'https://prometheus.crcs02ue1.devshift.net/api/v1'
              allowedHeaders: ['Authorization']
              headers:
                Authorization: "Bearer ${STAGE_PROMETHEUS_TOKEN}"

        #     #Plugin: Metrics and Monitoring
            '/prometheus/stage':
              target: https://prometheus.crcs02ue1.devshift.net/api/v1/
              secure: true
              credentials: dangerously-allow-unauthenticated
              headers:
                Authorization: "Bearer ${STAGE_PROMETHEUS_TOKEN}"
            '/prometheus/prod':
              target: https://prometheus.crcp01ue1.devshift.net/api/v1/
              secure: true
              credentials: dangerously-allow-unauthenticated
              headers:
                Authorization: "Bearer ${PROD_PROMETHEUS_TOKEN}"

        #     #Plugin: CPT
        #     '/cpt':
        #       target: 'http://elasticsearch.intlab.perf-infra.lab.eng.rdu2.redhat.com/results-dashboard-data/_doc/_search'

                
        #     #Other Proxies


        #     # Plugin: SonarQube
        #     '/sonarqube':
        #       # if not using sonarqube, assign SONARQUBE_URL to https://sonarcloud.io
        #       # target: https://sonarcloud.io/api
        #       target: ${SONARQUBE_URL}/api
        #       allowedMethods: ['GET']
        #       auth: ${SONARQUBE_TOKEN}

        #     # Plugin: Jenkins
        #     '/jenkins/api':
        #       target: ${JENKINS_URL}
        #       headers:
        #         Authorization: ${JENKINS_TOKEN}

        #     # Plugin: Jira
            '/jira/api':
              target: 'https://issues.redhat.com'
              headers:
                Authorization: ${JIRA_API_TOKEN}
                Accept: 'application/json'
                Content-Type: 'application/json'
                X-Atlassian-Token: 'no-check'
                User-Agent: ${JIRA_USER_AGENT}

        #     # Plugin: Jfrog Artifactory
        #     '/jfrog-artifactory/api':
        #       target: ${ARTIFACTORY_URL}
        #       headers:
        #         Authorization: Bearer ${ARTIFACTORY_TOKEN}
        #       # Change to "false" in case of using self hosted artifactory instance with a self-signed certificate
        #       secure: ${ARTIFACTORY_SECURE}

        #     # Plugin: PagerDuty
        #     '/pagerduty':
        #       target: https://api.pagerduty.com
        #       headers:
        #         Authorization: Token token=${PAGERDUTY_TOKEN}

        #     # Plugin: Dynatrace
        #     '/dynatrace':
        #       target: ${DYNATRACE_API_URL}
        #       headers:
        #         # This API access token requires entities.read and problems.read permissions
        #         # For more info on how to generate this token: https://www.dynatrace.com/support/help/dynatrace-api/basics/dynatrace-api-authentication
        #         Authorization: 'Api-Token ${DYNATRACE_ACCESS_TOKEN}'

        #     # Plugin: Nexus Repository Manager
        #     '/nexus-repository-manager':
        #       target: ${NEXUS_REPOSITORY_MANAGER_URL}
        #       headers:
        #         X-Requested-With: 'XMLHttpRequest'
        #         # Uncomment the following line to access a private Nexus Repository Manager using a token
        #         # Authorization: 'Bearer <NEXUS_REPOSITORY_MANAGER_TOKEN>'
        #       changeOrigin: true
        #       # Change to "false" in case of using self hosted Nexus Repository Manager instance with a self-signed certificate
        #       secure: ${NEXUS_REPOSITORY_MANAGER_SECURE}

        # # Reference documentation http://backstage.io/docs/features/techdocs/configuration
        # # Note: After experimenting with basic setup, use CI/CD to generate docs
        # # and an external cloud storage when deploying TechDocs for production use-case.
        # # https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach


        progressiveDelivery:
          saasPromotionsJson: /var/opt/progressive-delivery/saas-promotions.json

        ocm:
          webRcaUIUrl: https://web-rca.stage.devshift.net
          clientId: ${WEB_RCA_CLIENT_ID}
          clientSecret: ${WEB_RCA_CLIENT_SECRET}

        statusService:
          statusPageUrl: ${STATUSPAGE_URL}
          statusPageAuthToken: ${STATUSPAGE_AUTH}

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: saas-promotions
    data:
      saas-promotions.json: |
        {
          "nodes": ["{\"app\": \"acs-fleet-manager\", \"cluster\": \"app-sre-stage-01\", \"commit_sha\": \"f6fd56ce5aee5bbce11c56c51a999c96a6049cef\", \"deployment_state\": \"success\", \"isTest\": false, \"namespace\": \"acs-fleet-manager-stage\", \"resourceTemplate\": \"acs-fleet-manager\", \"saas\": \"acs-fleet-manager\", \"target\": \"acs-fleet-manager-stage\"}", "{\"app\": \"rhsm-api-proxy\", \"cluster\": \"appsres09ue1\", \"commit_sha\": \"e7c5a458cadee29bdc051e26948e500bf61f8da9\", \"deployment_state\": \"success\", \"isTest\": false, \"namespace\": \"rhsm-api-proxy-test\", \"resourceTemplate\": \"act-keys-ui-pytest\", \"saas\": \"act-keys-ui-pytest\", \"target\": null}"]
        }

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: change-log
    data:
      change-log.json: |
        {"items": [{"apps": ["app-sre-observability"], "change_types": ["resource-updates", "namespace-openshift-resources-updates"], "commit": "207e37c0857679269ed70f8c9384cfddf44abd88", "description": "Add alert for osd privatelink needs scaling out of VPCs due to reaching subnets ipv4 capacity (!160946)", "error": false, "merged_at": "2025-10-14T17:44:31.000+00:00"}, {"apps": ["kessel"], "change_types": ["saas-file-parameters", "saas-file-promotion"], "commit": "91e7f0766ec722649f1986991ff49c695aef8b74", "description": "Deploy inventory pod for db operations (!161194)", "error": false, "merged_at": "2025-10-14T17:34:49.000+00:00"}]}

  # backstage-env-vars deployment
  - apiVersion: v1
    kind: Secret
    metadata:
      name: backstage-env-vars
      annotations:
        qontract.recycle: "true"
    stringData:
      TECHDOCS_S3_BUCKET: "backstage-stage"
      TECHDOCS_S3_ENDPOINT: "https://backstage-minio:9000"
      TECHDOCS_S3_REGION: "none"
      TECHDOCS_S3_ACCESS_KEY: "testtesttest"
      TECHDOCS_S3_SECRET: "testtesttest"

      POSTGRES_HOST: "backstage-db"
      POSTGRES_DB: "backstage"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "backstage"
      POSTGRES_PASSWORD: "testtesttest"

      CACHE_PORT: "6379"
      CACHE_HOST: "valkey-service"
      CACHE_TOKEN: "testtesttest"

      FIRELINK_APP_URL: "https://firelink.devshift.net"
      FIRELINK_EPHEMERAL_CONSOLE_URL: "https://console-openshift-console.apps.crc-eph.r9lp.p1.openshiftapps.com"
      FIRELINK_EPHEMERAL_API_URL: "https://api.crc-eph.r9lp.p1.openshiftapps.com:6443"

  - apiVersion: v1
    kind: Secret
    metadata:
      name: finops-snowflake-env
      annotations:
        qontract.recycle: "true"
    stringData:
      SNOWFLAKE_ACCOUNT: "GDADCLC-RHSANDBOX"
      SNOWFLAKE_USER: "dataverse_webapphcmfinops_sandbox_appuser"
      SNOWFLAKE_WAREHOUSE: "DEFAULT"
      SNOWFLAKE_DATABASE: "HCMFINOPSSOURCE_DB"
      SNOWFLAKE_SCHEMA: "MARTS"
      SNOWFLAKE_ROLE: "DATAVERSE_WEBAPPHCMFINOPS_ROLE"
  # dynamic-plugins deployment
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: dynamic-plugins
      annotations:
        qontract.recycle: "true"
    data:
      dynamic-plugins.yaml: |
        includes:
        - dynamic-plugins.default.yaml
        plugins:
        - package: "https://github.com/RedHatInsights/snyk-plugin-dev/releases/download/2.4.1/backstage-plugin-snyk-dynamic-2.4.1.tgz"
          integrity: "sha256-iIhF6VPhYebKTaeEPbitiMOHzx1nq9PNPD142NrnRt8="
          disabled: false
          pluginConfig:
            dynamicPlugins:
              frontend:
