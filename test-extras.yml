  - apiVersion: v1
    kind: Service
    metadata:
      name: qontract-server
      labels:
        app: qontract-server
    spec:
      type: ClusterIP
      ports:
        - protocol: TCP
          port: 4000
          targetPort: 4000
          name: http
      selector:
        app: qontract-server
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: qontract-server
      labels:
        app: qontract-server
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: qontract-server
      template:
        metadata:
          labels:
            app: qontract-server
        spec:
          containers:
            - name: qontract-server
              image: quay.io/redhat-services-prod/app-sre-tenant/qontract-server-master/qontract-server-master:latest
              imagePullPolicy: Always
              ports:
                - name: http
                  containerPort: 4000
                  protocol: TCP
              env:
                - name: LOAD_METHOD
                  value: "fs"
                - name: DATAFILES_FILE
                  value: "/data/bundle/bundle.json"
                - name: NODE_ENV
                  value: "production"
                - name: NODE_OPTIONS
                  value: "--max-old-space-size=4096"
              volumeMounts:
                - name: bundle-data
                  mountPath: /data/bundle
                  readOnly: true
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: 4000
                  scheme: HTTP
                initialDelaySeconds: 30
                periodSeconds: 20
                timeoutSeconds: 10
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: 4000
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 20
                timeoutSeconds: 10
                failureThreshold: 3
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "30m"
                limits:
                  memory: "512Mi"
          volumes:
            - name: bundle-data
              persistentVolumeClaim:
                claimName: qontract-bundle-pvc
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: qontract-bundle-pvc
      labels:
        app: qontract-server
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      # Uncomment and specify a storageClassName if your cluster requires it
      # storageClassName: standard
  - apiVersion: v1
    kind: Pod
    metadata:
      name: qontract-bundle-uploader
      labels:
        app: qontract-server
        component: bundle-uploader
    spec:
      restartPolicy: Never
      containers:
        - name: uploader
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "echo 'Bundle uploader pod ready. Use: oc cp /path/to/bundle.json qontract-bundle-uploader:/data/bundle/bundle.json' && sleep 3600",
            ]
          volumeMounts:
            - name: bundle-data
              mountPath: /data/bundle
      volumes:
        - name: bundle-data
          persistentVolumeClaim:
            claimName: qontract-bundle-pvc
