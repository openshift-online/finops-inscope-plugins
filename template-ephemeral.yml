---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: backstage
parameters:
  - name: IMAGE
    value: quay.io/rhdh/rhdh-hub-rhel9
  - name: IMAGE_TAG
    value: "1.9-208"
  - name: OAUTH_IMAGE
    value: quay.io/openshift/origin-oauth-proxy
  - name: OAUTH_TAG
    value: 4.16.0
  - name: CADDY_IMAGE
    value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/caddy-ubi
  - name: CADDY_IMAGE_TAG
    value: 2f3cb0e
  - name: ENV_VARS_SECRET_NAME
    value: backstage-env-vars
  - name: GRAPHQL_URL
    value: https://app-interface.apps.rosa.appsrep09ue1.03r5.p3.openshiftapps.com/graphql
  - name: SAAS_PROMOTIONS_CONFIG_MAP_NAME
    value: saas-promotions
  - name: RESOURCES_IMAGE_TAG
    value: "latest"
  - name: HOSTNAME
    value: "https://inscope.corp.stage.redhat.com"
  - name: BACKSTAGE_REPLICAS
    value: "1"
  - name: BACKSTAGE_CPU_REQUEST
    value: "500m"
  - name: BACKSTAGE_CPU_LIMIT
    value: "1"
  - name: BACKSTAGE_MEMORY_REQUEST
    value: "14Gi"
  - name: BACKSTAGE_MEMORY_LIMIT
    value: "16Gi"
  - name: LOG_LEVEL
    value: "info"

### Backstage deployment
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backstage
      labels:
        app.kubernetes.io/name: backstage
    spec:
      replicas: ${{BACKSTAGE_REPLICAS}}
      selector:
        matchLabels:
          app.kubernetes.io/name: backstage
      template:
        metadata:
          annotations:
            test: test85
          labels:
            app.kubernetes.io/name: backstage
        spec:
          serviceAccountName: backstage
          volumes:
            - ephemeral:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                    - ReadWriteOnce
                    resources:
                      requests:
                        storage: 5Gi
              name: dynamic-plugins-root
            - configMap:
                defaultMode: 420
                name: dynamic-plugins
                optional: true
              name: dynamic-plugins
            - name: dynamic-plugins-npmrc
              secret:
                defaultMode: 420
                optional: true
                secretName: dynamic-plugins-npmrc
            - name: app-config
              configMap:
                name: backstage-app-config
            - name: redhat-ca
              secret:
                secretName: redhat-ca
            - name: github-integration
              secret:
                secretName: github-app-credentials
                optional: true
            # - name: proxy-tls
            #   secret:
            #     secretName: proxy-tls
            - name: saas-promotions
              configMap:
                name: ${SAAS_PROMOTIONS_CONFIG_MAP_NAME}
                defaultMode: 420
                optional: true
            - name: finops-snowflake-key
              secret:
                secretName: finops-snowflake-key
                optional: true
          initContainers:
            - command:
              - ./install-dynamic-plugins.sh
              - /dynamic-plugins-root
              env:
              - name: NPM_CONFIG_USERCONFIG
                value: /opt/app-root/src/.npmrc.dynamic-plugins
              - name: NODE_EXTRA_CA_CERTS
                value: "/app/redhat-ca/Current-IT-Root-CAs.pem"
              image: ${IMAGE}:${IMAGE_TAG}
              imagePullPolicy: Always
              name: install-dynamic-plugins
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "1"
                limits:
                  memory: "2Gi"
                  cpu: "1"
              volumeMounts:
              - name: redhat-ca
                mountPath: /app/redhat-ca
                readOnly: true
              - mountPath: /dynamic-plugins-root
                name: dynamic-plugins-root
              - mountPath: /opt/app-root/src/dynamic-plugins.yaml
                name: dynamic-plugins
                readOnly: true
                subPath: dynamic-plugins.yaml
              - mountPath: /opt/app-root/src/.npmrc.dynamic-plugins
                name: dynamic-plugins-npmrc
                readOnly: true
                subPath: .npmrc
              workingDir: /opt/app-root/src
          containers:
            - name: backend
              image: ${IMAGE}:${IMAGE_TAG}
              resources:
                requests:
                  memory: ${BACKSTAGE_MEMORY_REQUEST}
                  cpu: ${BACKSTAGE_CPU_REQUEST}
                limits:
                  memory: ${BACKSTAGE_MEMORY_LIMIT}
                  cpu: ${BACKSTAGE_CPU_LIMIT}
              imagePullPolicy: 'Always'
              command:
                - node
                - packages/backend
              args:
                - "--config"
                - "dynamic-plugins-root/app-config.dynamic-plugins.yaml"
                - "--config"
                - "/app/app-config.yaml"
              envFrom:
                - secretRef:
                    name: ${ENV_VARS_SECRET_NAME}
                - secretRef:
                    name: finops-snowflake-env
                    optional: true
              env:
                - name: SNOWFLAKE_PRIVATE_KEY_PATH
                  value: /opt/app-root/src/.secrets/snowflake/private_key.p8
                # GitLab credentials (from gl-creds secret)
                - name: GITLAB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: gl-creds
                      key: host
                      optional: true
                - name: GITLAB_API_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gl-creds
                      key: apiBaseUrl
                      optional: true
                - name: GITLAB_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: gl-creds
                      key: baseUrl
                      optional: true
                - name: GITLAB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: gl-creds
                      key: inscope-bot-token
                      optional: true
                # JIRA credentials
                - name: JIRA_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: jira
                      key: token
                      optional: true
                - name: JIRA_USER_AGENT
                  value: "backstage"
                # Quay API token
                - name: QUAY_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudservices-adminbot
                      key: token
                      optional: true
                # Jenkins CI Internal
                - name: JENKINS_USERNAME_CI_INT
                  valueFrom:
                    secretKeyRef:
                      name: ci-int
                      key: username
                      optional: true
                - name: JENKINS_APIKEY_CI_INT
                  valueFrom:
                    secretKeyRef:
                      name: ci-int
                      key: apiKey
                      optional: true
                # Jenkins CI External
                - name: JENKINS_USERNAME_CI_EXT
                  valueFrom:
                    secretKeyRef:
                      name: ci-ext
                      key: username
                      optional: true
                - name: JENKINS_APIKEY_CI_EXT
                  valueFrom:
                    secretKeyRef:
                      name: ci-ext
                      key: apiKey
                      optional: true
                # Snyk auth token
                - name: SNYK_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: snyk-auth-token
                      key: snyk_auth_token
                      optional: true
                # LDAP configuration
                - name: LDAP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ldap
                      key: password
                      optional: true
                - name: LDAP_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: ldap
                      key: username
                      optional: true
                - name: LDAP_HOSTNAME
                  valueFrom:
                    secretKeyRef:
                      name: ldap
                      key: hostname
                      optional: true
                # Web RCA client credentials
                - name: WEB_RCA_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: web-rca-client-credentials
                      key: WEB_RCA_CLIENT_ID
                      optional: true
                - name: WEB_RCA_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: web-rca-client-credentials
                      key: WEB_RCA_CLIENT_SECRET
                      optional: true
                # ElastiCache (Cache) configuration
                # Note: Cache configuration keys may need to be verified
                - name: CACHE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: backstage-stage-elasticache-db
                      key: token
                      optional: true
                - name: CACHE_HOST
                  valueFrom:
                    secretKeyRef:
                      name: backstage-stage-elasticache-db
                      key: host
                      optional: true
                - name: CACHE_PORT
                  valueFrom:
                    secretKeyRef:
                      name: backstage-stage-elasticache-db
                      key: port
                      optional: true
                # Prometheus tokens
                - name: PROD_PROMETHEUS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: crcp01ue1-app-sre-observability-per-cluster-backstage
                      key: token
                      optional: true
                - name: STAGE_PROMETHEUS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: crcs02ue1-app-sre-observability-per-cluster-backstage
                      key: token
                      optional: true
                # StatusPage
                - name: STATUSPAGE_URL
                  valueFrom:
                    secretKeyRef:
                      name: backstage-plugin-status-page
                      key: STATUSPAGE_URL
                      optional: true
                - name: STATUSPAGE_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: backstage-plugin-status-page
                      key: STATUSPAGE_AUTH
                      optional: true
                # Firelink Ephemeral API Token
                - name: FIRELINK_EPHEMERAL_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: crc-eph-bot-account
                      key: oc-login-token
                      optional: true
                # GitHub Actions PAT
                - name: GITHUB_ACTIONS_PAT
                  valueFrom:
                    secretKeyRef:
                      name: github-actions-pat
                      key: GITHUB_ACTIONS_PAT
                      optional: true
                # ACS (Advanced Cluster Security) Plugin
                - name: ACS_API_URL
                  valueFrom:
                    secretKeyRef:
                      name: inscope-acs-plugin
                      key: ACS_API_URL
                      optional: true
                - name: ACS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: inscope-acs-plugin
                      key: ACS_API_KEY
                      optional: true
                - name: STAGE_CLUSTER_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: stage-cluster-api-token
                      key: token
                      optional: true
                - name: PROD_CLUSTER_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: prod-cluster-api-token
                      key: token
                      optional: true
                # Standard environment variables
                - name: PGSSLMODE
                  value: allow
                - name: OAUTH_USER_HEADER
                  value: X-Forwarded-User
                - name: NODE_OPTIONS
                  value: "--no-node-snapshot --max-old-space-size=10240"
                - name: NODE_EXTRA_CA_CERTS
                  value: "/app/redhat-ca/Current-IT-Root-CAs.pem"
                # Note: The following are not available in ephemeral namespace:
                # - TECHDOCS_S3_BUCKET, TECHDOCS_S3_ENDPOINT, TECHDOCS_S3_REGION, TECHDOCS_S3_ACCESS_KEY, TECHDOCS_S3_SECRET
                # - POSTGRES_HOST, POSTGRES_DB, POSTGRES_PORT, POSTGRES_USER, POSTGRES_PASSWORD

                # - K8S_TOKEN_APPSREP05UE1, K8S_TOKEN_APPSREP09UE1
                # - OAUTH2_PROXY_COOKIE_SECRET
                # - OIDC_CLIENT_ID, OIDC_CLIENT_SECRET, OIDC_DISCOVERY_URL
                # - EXTERNAL_RESOURCES_PROMETHEUS_TOKEN_STAGE, EXTERNAL_RESOURCES_PROMETHEUS_TOKEN_PROD
                # - IBUTSU_API_TOKEN
                # - PROD_CLUSTER_API_TOKEN, STAGE_CLUSTER_API_TOKEN
                # - MATOMO_HOST, MATOMO_SITE_ID
                # - FIRELINK_APP_URL, FIRELINK_EPHEMERAL_CONSOLE_URL, FIRELINK_EPHEMERAL_API_URL
                # - TANGERINE_SA, TANGERINE_CLUSTER_URL
                # - LOG_LEVEL
              ports:
                - name: backend
                  containerPort: 7007
                  protocol: TCP
              readinessProbe:
                httpGet:
                  port: 7007
                  path: /healthcheck
                  httpHeaders:
                    - name: User-Agent
                      value: Probe
                periodSeconds: 30
                initialDelaySeconds: 120
                timeoutSeconds: 10
              livenessProbe:
                httpGet:
                  port: 7007
                  path: /healthcheck
                periodSeconds: 30
                initialDelaySeconds: 120
                timeoutSeconds: 10
              volumeMounts:
                - name: app-config
                  mountPath: /app/app-config.yaml
                  subPath: app-config.yaml
                  readOnly: true
                - name: github-integration
                  mountPath: /app/github
                  readOnly: true
                - name: redhat-ca
                  mountPath: /app/redhat-ca
                  readOnly: true
                - mountPath: /opt/app-root/src/dynamic-plugins-root
                  name: dynamic-plugins-root
                - name: finops-snowflake-key
                  mountPath: /opt/app-root/src/.secrets/snowflake
                  readOnly: true
                - name: saas-promotions
                  mountPath: /var/opt/progressive-delivery
                  readOnly: true
  - apiVersion: v1
    kind: Service
    metadata:
      name: backstage
      labels:
        app.kubernetes.io/name: backstage
      # annotations:
      #   service.alpha.openshift.io/serving-cert-secret-name: proxy-tls
    spec:
      type: ClusterIP
      ports:
        - name: backend
          port: 7007
          targetPort: backend
      selector:
        app.kubernetes.io/name: backstage
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: backstage
      annotations:
        serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"backstage"}}'
    imagePullSecrets:
      - name: quay.io
  - apiVersion: v1
    kind: Secret
    metadata:
      name: dynamic-plugins-npmrc
    stringData:
      .npmrc: |
        registry=https://nexus.corp.redhat.com/

### caddy fronting proxy
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: caddy-fronting-proxy
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: caddy-fronting-proxy
      template:
        metadata:
          annotations:
            test: test7
          labels:
            app: caddy-fronting-proxy
        spec:
          volumes:
            - name: caddy-config
              configMap:
                name: caddy-reverse-proxy
                defaultMode: 420
            - name: certs
              secret:
                secretName: tls-certs
          serviceAccountName: default
          containers:
            - name: caddy-reverse-proxy
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "500m"
                limits:
                  memory: "3Gi"
                  cpu: "1"
              terminationMessagePath: /dev/termination-log
              command:
                - caddy
                - run
                - '--config'
                - /etc/caddy/Caddyfile
              ports:
                - containerPort: 8080
                  protocol: TCP
                  name: proxy
              imagePullPolicy: Always
              volumeMounts:
                - name: caddy-config
                  mountPath: /etc/caddy/Caddyfile
                  subPath: Caddyfile
                  readOnly: true
                - name: certs
                  mountPath: /opt/app-root/certs
                  readOnly: true
              terminationMessagePolicy: File
              image: ${CADDY_IMAGE}:${CADDY_IMAGE_TAG}
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: caddy-reverse-proxy
    data:
      Caddyfile: |
        {
          auto_https disable_redirects
        }
        ${HOSTNAME}:8080 {
          tls /opt/app-root/certs/certificate /opt/app-root/certs/key

          reverse_proxy {
            to http://backstage:7007
            transport http {
              versions 1.1
            }
          }
        }
  - apiVersion: v1
    kind: Service
    metadata:
      name: caddy-fronting-proxy
      labels:
        app: caddy-fronting-proxy
    spec:
      type: ClusterIP
      ports:
        - name: caddy-fronting-proxy
          port: 443
          targetPort: 8080
      selector:
        app: caddy-fronting-proxy

### Kroki deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      annotations:
        test: test1
      name: kroki
      labels:
        app: kroki
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: kroki
      template:
        metadata:
          labels:
            app: kroki
        spec:
          serviceAccountName: kroki
          containers:
          - name: kroki
            image: quay.io/app-sre/kroki:0.25.0
            env:
              - name: KROKI_MERMAID_HOST
                value: kroki-mermaid-renderer:8002
            resources:
              requests:
                memory: "2Gi"
                cpu: "500m"
              limits:
                memory: "3Gi"
                cpu: "1"
            ports:
            - containerPort: 8000
              name: 'kroki'
          restartPolicy: Always
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
      labels:
        app: kroki
      name: kroki
    spec:
      ports:
      - name: "kroki"
        port: 8000
        targetPort: 8000
      selector:
        app: kroki
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kroki-mermaid-renderer
      labels:
        app: kroki-mermaid-renderer
      annotations:
        test: test1
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: kroki-mermaid-renderer
      template:
        metadata:
          annotations:
            test: test1
          labels:
            app: kroki-mermaid-renderer
        spec:
          serviceAccountName: kroki-mermaid-renderer
          containers:
          - name: kroki-mermaid-renderer
            image: quay.io/app-sre/kroki-mermaid:0.25.0
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1"
            ports:
            - containerPort: 8002
              name: 'kroki-mermaid'
          restartPolicy: Always
  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
      labels:
        app: kroki-mermaid-renderer
      name: kroki-mermaid-renderer
    spec:
      ports:
      - name: "kroki-mermaid"
        port: 8002
        targetPort: 8002
      selector:
        app: kroki-mermaid-renderer
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: kroki
    imagePullSecrets:
      - name: quay.io
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: kroki-mermaid-renderer
    imagePullSecrets:
      - name: quay.io

### inScope Resources
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: inscope-resources
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: inscope-resources
      template:
        metadata:
          labels:
            app: inscope-resources
        spec:
          serviceAccountName: backstage
          containers:
            - name: inscope-resources
              image: quay.io/redhat-services-prod/hcm-eng-prod-tenant/inscope-resources-master/inscope-resources-master:${RESOURCES_IMAGE_TAG}
              ports:
                - name: caddy-port
                  containerPort: 8000
                  protocol: TCP
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
              volumeMounts:
                - name: change-log
                  readOnly: true
                  mountPath: "/opt/app-root/src/resources/configmap/change-log"
                - name: saas-promotions
                  readOnly: true
                  mountPath: "/opt/app-root/src/resources/configmap/saas-promotions"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: inscope-s3-creds
                      key: minio_root_user
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: inscope-s3-creds
                      key: minio_root_password
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: inscope-s3-creds
                      key: region
                - name: BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: inscope-s3-creds
                      key: bucket
          volumes:
            - name: change-log
              configMap:
                name: change-log
            - name: saas-promotions
              configMap:
                name: saas-promotions
  - apiVersion: v1
    kind: Service
    metadata:
      name: inscope-resources
    spec:
      selector:
        app: inscope-resources
      ports:
        - protocol: TCP
          port: 80
          targetPort: caddy-port
